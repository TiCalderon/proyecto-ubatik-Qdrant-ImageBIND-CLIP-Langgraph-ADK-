<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ubatik RAG Histologia — Grupo 3</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <h1 class="logo">UBATIK <span>Histologia</span></h1>
        <span class="badge">G3</span>
      </div>
      <div class="header-right">
        <span id="status-dot" class="status-dot offline"></span>
        <span id="status-text" class="status-text">Conectando...</span>
        <button id="btn-temario" class="btn-ghost" title="Ver temario">Temario</button>
        <button id="btn-clear-img" class="btn-ghost" title="Limpiar imagen activa">Limpiar</button>
      </div>
    </header>

    <main class="chat-area">
      <div id="welcome" class="welcome-screen">
        <div class="welcome-icon">&#129514;</div>
        <h2>Asistente de Histologia</h2>
        <p>Subi una imagen del manual o describila con texto para identificarla</p>
        <div class="suggestion-chips">
          <button class="chip" data-query="Que tipos de cartilago existen?">Tipos de cartilago</button>
          <button class="chip" data-query="Que es una osteona?">Osteona</button>
          <button class="chip" data-query="Mostrame una imagen de tejido nervioso">Tejido nervioso</button>
          <button class="chip" data-query="Describi el tejido muscular estriado">Musculo estriado</button>
        </div>
      </div>
      <div id="messages" class="messages-container"></div>
      <div id="image-gallery" class="image-gallery" style="display:none;">
        <h3>Imagenes del Manual</h3>
        <div id="gallery-grid" class="gallery-grid"></div>
      </div>
    </main>

    <div class="input-area">
      <div id="img-preview-bar" class="img-preview-bar" style="display:none;">
        <span id="img-preview-name"></span>
        <span id="img-preview-size"></span>
        <button id="btn-remove-img" class="btn-ghost-small">&times;</button>
      </div>
      <div class="input-row">
        <button id="btn-upload" class="btn-icon" title="Subir imagen">+</button>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        <textarea id="query-input" rows="1" placeholder="Describi una imagen del manual o subi una para identificarla..."></textarea>
        <button id="btn-send" class="btn-send">Enviar</button>
      </div>
    </div>

    <aside id="temario-panel" class="temario-panel" style="display:none;">
      <div class="temario-header">
        <h3>Temario de Histologia</h3>
        <button id="btn-close-temario" class="btn-ghost">&times;</button>
      </div>
      <ul id="temario-list" class="temario-list"></ul>
    </aside>
  </div>

  <div id="lightbox" class="lightbox" style="display:none;">
    <span class="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="Imagen ampliada">
    <div id="lightbox-caption" class="lightbox-caption"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
